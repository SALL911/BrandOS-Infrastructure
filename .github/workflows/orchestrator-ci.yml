name: Orchestrator CI

on:
  push:
    paths:
      - 'apps/orchestrator/**'
      - '.github/workflows/orchestrator-ci.yml'
  pull_request:
    paths:
      - 'apps/orchestrator/**'
  workflow_dispatch:

jobs:
  typecheck-and-build:
    name: typecheck + brandos build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/orchestrator
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: apps/orchestrator/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Vite build (brandos)
        run: pnpm --filter @workspace/brandos run build
